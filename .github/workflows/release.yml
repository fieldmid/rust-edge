# This workflow builds the Rust project and publishes Linux-only release binaries
# (x86_64 and aarch64) on every push to master and on every new tag.

name: Build and Release FieldMid CLI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64
            rust_target: x86_64-unknown-linux-gnu
            artifact_name: fieldmid-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64
            rust_target: aarch64-unknown-linux-gnu
            artifact_name: fieldmid-linux-aarch64
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - name: Build binary
        run: |
          cargo build --release --target ${{ matrix.rust_target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/${{ matrix.rust_target }}/release/fieldmid*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ./artifacts/**/fieldmid*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
